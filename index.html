<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息表单</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <!-- Element Plus 中文语言包 -->
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #303133;
        }
        .success-container {
            text-align: center;
            padding: 50px 20px;
        }
        .success-icon {
            font-size: 64px;
            color: #67c23a;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 24px;
            color: #303133;
            margin-bottom: 15px;
        }
        .success-message {
            color: #606266;
            margin-bottom: 30px;
        }
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            text-align: left;
        }
        .info-item {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .info-label {
            font-weight: bold;
            color: #303133;
        }
        .info-value {
            color: #606266;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 表单页面 -->
        <div v-if="currentPage === 'form'" class="container">
            <h2 class="form-title">个人信息表单</h2>
            <el-form 
                :model="form" 
                :rules="rules" 
                ref="formRef" 
                label-width="100px"
                label-position="right">
                
                <el-form-item label="姓名" prop="name">
                    <el-input v-model="form.name" placeholder="请输入您的姓名"></el-input>
                </el-form-item>
                
                <el-form-item label="性别" prop="gender">
                    <el-radio-group v-model="form.gender">
                        <el-radio label="male">男</el-radio>
                        <el-radio label="female">女</el-radio>
                    </el-radio-group>
                </el-form-item>
                
                <el-form-item label="年龄" prop="age">
                    <el-input-number 
                        v-model="form.age" 
                        :min="1" 
                        :max="120" 
                        placeholder="请输入年龄"
                        style="width: 100%">
                    </el-input-number>
                </el-form-item>
                
                <el-form-item label="邮箱" prop="email">
                    <el-input v-model="form.email" placeholder="请输入您的邮箱"></el-input>
                </el-form-item>
                
                <el-form-item label="手机号" prop="phone">
                    <el-input v-model="form.phone" placeholder="请输入您的手机号"></el-input>
                </el-form-item>
                
                <el-form-item label="出生日期" prop="birthDate">
                    <el-date-picker
                        v-model="form.birthDate"
                        type="date"
                        placeholder="请选择出生日期"
                        format="YYYY-MM-DD"
                        value-format="YYYY-MM-DD"
                        style="width: 100%">
                    </el-date-picker>
                </el-form-item>
                
                <el-form-item label="地址" prop="address">
                    <el-input 
                        v-model="form.address" 
                        type="textarea" 
                        :rows="3"
                        placeholder="请输入您的详细地址">
                    </el-input>
                </el-form-item>
                
                <el-form-item label="个人简介" prop="bio">
                    <el-input 
                        v-model="form.bio" 
                        type="textarea" 
                        :rows="4"
                        placeholder="请简单介绍一下自己">
                    </el-input>
                </el-form-item>
                
                <el-form-item>
                    <el-button type="primary" @click="submitForm" :loading="loading" style="width: 100%">
                        提交表单
                    </el-button>
                    <el-button @click="resetForm" style="width: 100%; margin-top: 10px;">
                        重置
                    </el-button>
                </el-form-item>
            </el-form>
        </div>
        
        <!-- 成功页面 -->
        <div v-else-if="currentPage === 'success'" class="container success-container">
            <div class="success-icon">
                <el-icon><Check /></el-icon>
            </div>
            <h2 class="success-title">提交成功！</h2>
            <p class="success-message">您的个人信息已成功提交，感谢您的配合。</p>
            
            <div class="user-info">
                <h3 style="margin-top: 0; color: #303133;">提交的信息：</h3>
                <div class="info-item">
                    <span class="info-label">姓名：</span>
                    <span class="info-value">{{ form.name }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">性别：</span>
                    <span class="info-value">{{ form.gender === 'male' ? '男' : '女' }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">年龄：</span>
                    <span class="info-value">{{ form.age }} 岁</span>
                </div>
                <div class="info-item">
                    <span class="info-label">邮箱：</span>
                    <span class="info-value">{{ form.email }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">手机号：</span>
                    <span class="info-value">{{ form.phone }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">出生日期：</span>
                    <span class="info-value">{{ form.birthDate }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">地址：</span>
                    <span class="info-value">{{ form.address }}</span>
                </div>
                <div class="info-item" v-if="form.bio">
                    <span class="info-label">个人简介：</span>
                    <span class="info-value">{{ form.bio }}</span>
                </div>
            </div>
            
            <el-button type="primary" @click="goBack" style="margin-right: 10px;">
                返回表单
            </el-button>
            <el-button @click="resetAll">
                重新填写
            </el-button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const currentPage = ref('form'); // 'form' 或 'success'
                const loading = ref(false);
                const formRef = ref(null);
                
                const form = ref({
                    name: '',
                    gender: 'male',
                    age: null,
                    email: '',
                    phone: '',
                    birthDate: '',
                    address: '',
                    bio: ''
                });
                
                // 表单验证规则
                const rules = {
                    name: [
                        { required: true, message: '请输入姓名', trigger: 'blur' },
                        { min: 2, max: 20, message: '姓名长度应在 2 到 20 个字符', trigger: 'blur' }
                    ],
                    gender: [
                        { required: true, message: '请选择性别', trigger: 'change' }
                    ],
                    age: [
                        { required: true, message: '请输入年龄', trigger: 'blur' },
                        { type: 'number', min: 1, max: 120, message: '年龄应在 1 到 120 之间', trigger: 'blur' }
                    ],
                    email: [
                        { required: true, message: '请输入邮箱地址', trigger: 'blur' },
                        { type: 'email', message: '请输入正确的邮箱地址', trigger: 'blur' }
                    ],
                    phone: [
                        { required: true, message: '请输入手机号', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号', trigger: 'blur' }
                    ],
                    birthDate: [
                        { required: true, message: '请选择出生日期', trigger: 'change' }
                    ],
                    address: [
                        { required: true, message: '请输入地址', trigger: 'blur' },
                        { min: 5, max: 200, message: '地址长度应在 5 到 200 个字符', trigger: 'blur' }
                    ],
                    bio: [
                        { max: 500, message: '个人简介不能超过 500 个字符', trigger: 'blur' }
                    ]
                };
                
                // 提交表单
                const submitForm = async () => {
                    if (!formRef.value) return;
                    
                    try {
                        await formRef.value.validate();
                        loading.value = true;
                        
                        // 模拟异步提交
                        setTimeout(() => {
                            loading.value = false;
                            currentPage.value = 'success';
                            ElementPlus.ElMessage.success('表单提交成功！');
                        }, 1500);
                        
                    } catch (error) {
                        ElementPlus.ElMessage.error('请检查表单填写是否正确');
                    }
                };
                
                // 重置表单
                const resetForm = () => {
                    if (formRef.value) {
                        formRef.value.resetFields();
                    }
                };
                
                // 返回表单
                const goBack = () => {
                    currentPage.value = 'form';
                };
                
                // 重新填写
                const resetAll = () => {
                    resetForm();
                    currentPage.value = 'form';
                };
                
                return {
                    currentPage,
                    loading,
                    formRef,
                    form,
                    rules,
                    submitForm,
                    resetForm,
                    goBack,
                    resetAll
                };
            }
        }).use(ElementPlus, {
            locale: ElementPlusLocaleZhCn
        }).mount('#app');
    </script>
</body>
</html>
